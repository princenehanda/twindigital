<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — GRIPPX Fuel Intelligence</title>
<link rel="stylesheet" href="css/styles.css">
<style>
  body{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 20px; }
  .login-wrap{ max-width:760px; width:100%; }
  .login-head{ text-align:center; margin-bottom:36px; }
  .login-head .brand{ justify-content:center; margin-bottom:22px; }
  .login-head h1{ font-size:24px; margin-bottom:10px; }
  .login-head p{ color:var(--text-dim); font-size:14px; max-width:480px; margin:0 auto; }
  .persona-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
  @media (max-width:760px){ .persona-grid{ grid-template-columns:1fr; } }
  .persona-card{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius-lg);
    padding:22px 18px; text-align:left; cursor:pointer; transition:transform .15s, border-color .15s, background .15s;
    position:relative;
  }
  .persona-card:hover{ border-color:var(--line-strong); background:var(--panel-2); transform:translateY(-2px); }
  .persona-remove{
    position:absolute; top:14px; right:14px; width:20px; height:20px; border-radius:50%;
    background:var(--panel-3); border:1px solid var(--line-strong); color:var(--text-faint);
    font-size:11px; display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .persona-remove:hover{ color:var(--red); border-color:var(--red); }
  .persona-card.add-card{
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
    border-style:dashed; color:var(--text-dim); min-height:180px;
  }
  .persona-card.add-card .plus{ font-size:22px; color:var(--cyan); margin-bottom:8px; }
  .enroll-form{
    background:var(--panel); border:1px solid var(--line-strong); border-radius:var(--radius-lg);
    padding:24px; margin-top:20px; text-align:left; display:none;
  }
  .enroll-form.open{ display:block; }
  .enroll-form h3{ font-size:15px; margin-bottom:16px; }
  .enroll-row{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
  .enroll-row.full{ grid-template-columns:1fr; }
  .enroll-form label{ display:block; font-size:11.5px; color:var(--text-faint); font-family:var(--font-mono); margin-bottom:6px; }
  .enroll-form input, .enroll-form select{
    width:100%; background:var(--panel-2); border:1px solid var(--line-strong); color:var(--text);
    border-radius:8px; padding:9px 12px; font-size:13px; font-family:var(--font-body);
  }
  .enroll-actions{ display:flex; gap:10px; margin-top:6px; }
  .persona-avatar{
    width:40px; height:40px; border-radius:50%; margin-bottom:14px;
    background:linear-gradient(135deg, var(--amber), var(--cyan));
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-mono); font-weight:600; font-size:14px; color:#1A1102;
  }
  .persona-card h3{ font-size:15px; margin-bottom:2px; }
  .persona-title{ font-size:12px; color:var(--text-faint); font-family:var(--font-mono); margin-bottom:10px; }
  .persona-badge{ display:inline-block; font-size:10.5px; font-family:var(--font-mono); color:var(--cyan); background:rgba(72,198,232,0.1); border:1px solid rgba(72,198,232,0.3); border-radius:5px; padding:3px 8px; margin-bottom:10px; }
  .persona-desc{ font-size:12px; color:var(--text-dim); line-height:1.5; }
  .login-foot{ text-align:center; margin-top:28px; font-size:12.5px; color:var(--text-faint); }
  .login-foot a{ color:var(--cyan); }
</style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-head">
      <div class="brand"><span class="mark"></span><div>GRIPPX<br><small>FUEL INTELLIGENCE</small></div></div>
      <h1>Sign in to the live command centre</h1>
      <p>Pick a persona to sign in as. GRIPPX shows each role only what's relevant to their job — the same platform, genuinely different views. Add your own named personas below.</p>
    </div>

    <div class="persona-grid" id="persona-grid"></div>

    <div class="enroll-form" id="enroll-form">
      <h3>Add a persona</h3>
      <div class="enroll-row">
        <div><label>Name</label><input id="enroll-name" type="text" placeholder="e.g. Sarah Chen"></div>
        <div><label>Title</label><input id="enroll-title" type="text" placeholder="e.g. Chief Financial Officer"></div>
      </div>
      <div class="enroll-row full">
        <div>
          <label>Access level</label>
          <select id="enroll-role">
            <option value="exec">Executive — strategic, read-only, all sites</option>
            <option value="ops">Operations Manager — live fleet &amp; alert control</option>
            <option value="depot">Depot Technician — device-level, one site</option>
          </select>
        </div>
      </div>
      <div class="enroll-row full" id="enroll-depot-row" style="display:none;">
        <div><label>Assigned depot</label><select id="enroll-depot"></select></div>
      </div>
      <div class="enroll-row full" id="enroll-ops-row" style="display:none;">
        <div><label>Scope</label><select id="enroll-ops-scope"></select></div>
      </div>
      <div class="enroll-actions">
        <button type="button" class="btn btn-primary btn-sm" id="enroll-save">Add persona</button>
        <button type="button" class="btn btn-ghost btn-sm" id="enroll-cancel">Cancel</button>
      </div>
    </div>

    <div class="login-foot">
      <a href="index.html">← Back to the overview</a>
    </div>
  </div>

<script src="js/data.js"></script>
<script>
  function paintGrid(){
    const personas = getAllPersonas();
    document.getElementById('persona-grid').innerHTML = personas.map(p => `
      <div class="persona-card" onclick="signIn('${p.id}')">
        ${!p.builtin ? `<span class="persona-remove" onclick="event.stopPropagation(); removePersona('${p.id}')" title="Remove persona">✕</span>` : ''}
        <div class="persona-avatar">${p.name.split(' ').map(s=>s[0]).join('').slice(0,2)}</div>
        <h3>${p.name}</h3>
        <div class="persona-title">${p.title}</div>
        <div class="persona-badge">${p.badge}</div>
        <div class="persona-desc">${p.desc}</div>
      </div>`).join('') + `
      <div class="persona-card add-card" onclick="openEnrollForm()">
        <div class="plus">+</div>
        <div>Add a persona</div>
      </div>`;
  }
  paintGrid();

  function signIn(personaId){
    loginAsPersona(personaId);
    window.location.href = 'dashboard.html?persona=' + encodeURIComponent(personaId);
  }
  function removePersona(id){
    removeCustomPersona(id);
    paintGrid();
  }

  const enrollForm = document.getElementById('enroll-form');
  const roleSelect = document.getElementById('enroll-role');
  const depotRow = document.getElementById('enroll-depot-row');
  const opsRow = document.getElementById('enroll-ops-row');
  const depotSelect = document.getElementById('enroll-depot');
  const opsScopeSelect = document.getElementById('enroll-ops-scope');

  depotSelect.innerHTML = DEPOTS.map(d=>`<option value="${d.id}">${d.name}</option>`).join('');
  opsScopeSelect.innerHTML = '<option value="national">National (all regions)</option>' +
    getRegions().map(r=>`<option value="${r}">${r} region</option>`).join('');

  function openEnrollForm(){
    enrollForm.classList.add('open');
    enrollForm.scrollIntoView({ behavior:'smooth', block:'center' });
  }
  function updateEnrollFields(){
    depotRow.style.display = roleSelect.value === 'depot' ? '' : 'none';
    opsRow.style.display = roleSelect.value === 'ops' ? '' : 'none';
  }
  roleSelect.addEventListener('change', updateEnrollFields);
  updateEnrollFields();

  document.getElementById('enroll-cancel').addEventListener('click', ()=>{
    enrollForm.classList.remove('open');
  });
  document.getElementById('enroll-save').addEventListener('click', ()=>{
    const name = document.getElementById('enroll-name').value.trim();
    const title = document.getElementById('enroll-title').value.trim();
    if (!name || !title){ alert('Please enter a name and title.'); return; }
    const role = roleSelect.value;
    const depotSite = role === 'depot' ? depotSelect.value : undefined;
    const opsScope = role === 'ops' ? opsScopeSelect.value : undefined;
    enrollPersona({ name, title, role, depotSite, opsScope });
    document.getElementById('enroll-name').value = '';
    document.getElementById('enroll-title').value = '';
    enrollForm.classList.remove('open');
    paintGrid();
  });
</script>
</body>
</html>
